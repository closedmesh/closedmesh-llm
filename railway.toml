# Railway service config — closedmesh public mesh entry node.
#
# Builds the Docker image at fly/Dockerfile (the same image used for the
# Fly deployment upstream) and runs it in client/console mode, which
# tunnels OpenAI-compatible /v1 requests to GPU peers discovered over the
# mesh. Vercel's `closedmesh.com/api/chat` proxies to the public URL of
# this service via $CLOSEDMESH_RUNTIME_URL.
#
# Env vars to set on the Railway service (via dashboard or CLI):
#
#   APP_MODE       = console        (default; overrideable)
#   MESH_HEADLESS  = 1              (no web UI; /api/* still served)
#   PORT           = 9337           (Railway assigns by default; entrypoint
#                                    binds the closedmesh API to whatever
#                                    Railway provides)
#   MESH_NAME      = closedmesh     (default in entrypoint.sh; scopes
#                                    discovery + publication to a named
#                                    mesh so peers running the binary with
#                                    the same name join *this* mesh
#                                    instead of the unnamed community pool)
#   MESH_PUBLISH   = 1              (default; advertises the listing on
#                                    Nostr so contributors can discover us)
#   MESH_AUTH_TOKEN = <secret>      (gates /v1/* via Caddy; required for
#                                    public PaaS deployments)
#
# Persistence note: the runtime stores its Nostr identity (which is part
# of the mesh ID for named meshes) at $HOME/.closedmesh/. On Railway,
# that path is ephemeral by default — every redeploy regenerates the key
# and shifts the mesh ID, which forces contributors to re-discover. To
# pin the mesh, attach a Railway volume mounted at /root/.closedmesh and
# the originator pubkey will survive redeploys.
#
# Why this isn't a worker / GPU node: Railway has no GPUs. The mesh
# discovers GPU peers (your Mac, vast.ai instances, Hetzner GPU boxes)
# over Nostr and tunnels inference to them via QUIC. This service is the
# *entry* — small, cheap, always-on.

[build]
builder = "DOCKERFILE"
dockerfilePath = "fly/Dockerfile"

[deploy]
# Restart on crash but don't loop forever if something is fundamentally
# broken — surface failures instead of masking them.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Probe the OpenAI-compatible endpoint. `/v1/models` returns 200 with a
# (possibly empty) JSON list as soon as the API is up; that's a stricter
# check than a TCP-only probe.
#
# Cold-start budget for a *named* mesh with no peers yet:
#   ~1s   Caddy comes up
#   ~5s   Nostr relay connect + initial discovery query
#   ~30s  "Failed to join any peer" timeout (named mesh, 0 peers)
#   ~5s   Standalone bring-up + API bind
# Total ~40s steady-state, but cold container + cold relays can stretch
# to 90–120s. 60s left no headroom and rolled back our first deploy with
# the named mesh enabled. 300s gives us a comfortable margin without
# masking a real boot failure.
healthcheckPath = "/v1/models"
healthcheckTimeout = 300
