# Railway service config — closedmesh public mesh entry node.
#
# Builds the Docker image at fly/Dockerfile (the same image used for the
# Fly deployment upstream) and runs it in client/console mode, which
# tunnels OpenAI-compatible /v1 requests to GPU peers discovered over the
# mesh. Vercel's `closedmesh.com/api/chat` proxies to the public URL of
# this service via $CLOSEDMESH_RUNTIME_URL.
#
# Env vars to set on the Railway service (via dashboard or CLI):
#
#   APP_MODE       = console        (default; overrideable)
#   MESH_HEADLESS  = 1              (no web UI; /api/* still served)
#   PORT           = 9337           (Railway assigns by default; entrypoint
#                                    binds the closedmesh API to whatever
#                                    Railway provides)
#
# Why this isn't a worker / GPU node: Railway has no GPUs. The mesh
# discovers GPU peers (your Mac, vast.ai instances, Hetzner GPU boxes)
# over Nostr and tunnels inference to them via QUIC. This service is the
# *entry* — small, cheap, always-on.

[build]
builder = "DOCKERFILE"
dockerfilePath = "fly/Dockerfile"

[deploy]
# Restart on crash but don't loop forever if something is fundamentally
# broken — surface failures instead of masking them.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Probe the OpenAI-compatible endpoint. `/v1/models` returns 200 with a
# (possibly empty) JSON list as soon as the API is up; that's a stricter
# check than a TCP-only probe.
healthcheckPath = "/v1/models"
healthcheckTimeout = 30
